<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campaign Tracker — GIE Work</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='5' cy='12' r='4' fill='%23ff3d57'/%3E%3Ccircle cx='12' cy='12' r='4' fill='%23ffcb00'/%3E%3Ccircle cx='19' cy='12' r='4' fill='%2300c875'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="topbar">
  <div class="tb-left">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <circle cx="5" cy="12" r="4" fill="#ff3d57"/>
        <circle cx="12" cy="12" r="4" fill="#ffcb00"/>
        <circle cx="19" cy="12" r="4" fill="#00c875"/>
      </svg>
      <span class="logo-text"><b>campaign</b>tracker <em>by GIE</em></span>
    </div>
  </div>
  <div class="tb-center">
    <div class="tb-search">
      <span class="tb-search-ico"></span>
      <input id="global-search" type="text" placeholder="Search for anything..." autocomplete="off">
    </div>
  </div>
  <div class="tb-right">
    <button class="icon-btn" id="theme-btn" title="Toggle dark mode"></button>
    <button class="icon-btn" id="bell-btn" title="Notifications"></button>
    <button class="avatar-btn" id="me-btn" title="Profile"></button>
  </div>
</header>

<div id="shell">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

<div id="panel-root"></div>
<div id="bulk-root"></div>
<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
